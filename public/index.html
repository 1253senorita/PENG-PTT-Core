<!DOCTYPE html>
<html lang="ko">
<head>
    <title>PENG-Link 🐧</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="/socket.io/socket.io.js" defer></script>

    <style>
        /* ------------------------------------------------------------ */
        /* [UI(🖥️🖥️🖥️)] GLOBAL RESET & NEUMORPHISM STYLE             */
        /* ------------------------------------------------------------ */
        body { margin: 0; padding: 0; background-color: #e0e5ec; overflow-x: hidden; font-family: 'Malgun Gothic', sans-serif; }
        
        #entry-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #2c3e50, #000); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 9999; transition: opacity 0.5s ease-out; 
        }

        #main-app { 
            opacity: 0; 
            pointer-events: none; padding: 15px; width: 100%; max-width: 500px; 
            margin: auto; box-sizing: border-box; min-height: 100vh; 
            display: flex; flex-direction: column; transition: opacity 0.5s;
        }
        
        /* [📍 STATUS PANEL] */
        #connect-btn { padding: 20px 50px; font-size: 1.4rem; cursor: pointer; border-radius: 50px; border: none; background: #3498db; color: white; font-weight: bold; box-shadow: 0 10px 20px rgba(52,152,219,0.3); }
        .status-panel { background: #1a1a1a; color: #00ff00; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 4px solid #333; box-shadow: 10px 10px 20px #bebebe, inset 0 0 15px #000; position: relative; overflow: hidden; }
        .antenna-box { display: flex; align-items: flex-end; gap: 4px; height: 20px; }
        .ant-bar { width: 6px; background: #333; border-radius: 1px; }
        .ant-bar.active { background: #00ff00; box-shadow: 0 0 8px #00ff00; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        /* [📍 PTT BUTTON UPGRADE] */
        .btn-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 0; }
        
        #start { 
            width: 240px; height: 240px; border-radius: 50%; border: 10px solid #e0e5ec;
            background: #e0e5ec;
            cursor: pointer; position: relative;
            /* 물리적 입체감 (뉴모피즘) */
            box-shadow: 15px 15px 30px #bebebe, -15px -15px 30px #ffffff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.1s ease;
            outline: none; -webkit-tap-highlight-color: transparent;
        }

        #btn-icon { font-size: 6rem; transition: 0.15s; filter: drop-shadow(4px 4px 6px rgba(0,0,0,0.1)); z-index: 2; }
        #btn-text { font-weight: 900; color: #666; margin-top: 5px; letter-spacing: 2px; z-index: 2; font-size: 1.1rem; }

        /* [PUSH! 물리적 클릭 효과] */
        #start:active { 
            box-shadow: inset 8px 8px 16px #bebebe, inset -8px -8px 16px #ffffff;
            transform: scale(0.96); 
        }
        #start:active #btn-icon { transform: scale(0.85); filter: none; }
        #start:active #btn-text { color: #ff4757; }

        /* 전파 확산 효과 */
        .signal-wave {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; background: rgba(255, 71, 87, 0.4);
            opacity: 0; pointer-events: none; z-index: 1;
        }
        #start:active .signal-wave { animation: pulse-ring 1.2s infinite; }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.7); opacity: 0; }
        }

        /* [📍 LOGS & CONFIG] */
        .config-bar { background: rgba(255,255,255,0.3); padding: 12px 18px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; color: #444; font-weight: bold; }
        .config-bar select { border: none; border-radius: 8px; padding: 5px; background: #e0e5ec; box-shadow: inset 2px 2px 5px #bebebe, inset -2px -2px 5px #ffffff; }
        
        .log-section { background: rgba(255, 255, 255, 0.6); border-radius: 30px 30px 0 0; padding: 20px; box-shadow: 0 -10px 20px rgba(0,0,0,0.05); backdrop-filter: blur(10px); }
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #chat-box { height: 250px; overflow-y: auto; padding: 5px; }
        .msg-bubble { background: #e0e5ec; padding: 12px; border-radius: 15px; margin-bottom: 12px; box-shadow: 5px 5px 10px #bebebe, -5px -5px 10px #ffffff; border-left: 5px solid #3498db; }
        .msg-bubble.other { border-left-color: #e67e22; }
        .btn-mini { border: none; padding: 8px 15px; border-radius: 10px; color: white; font-size: 0.8rem; font-weight: bold; cursor: pointer; background: #e74c3c; box-shadow: 3px 3px 6px #bebebe; }
    </style>
</head>
<body>

    <div id="entry-layer">
        <div style="font-size: 6rem; margin-bottom: 20px;">🐧</div>
        <h1 style="color: white; margin-bottom: 40px; letter-spacing: 3px;">PENG-Link v3</h1>
        <button id="connect-btn">무전 시작하기</button>
    </div>

    <div id="main-app">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0; color: #2c3e50;">🐧 PENG-Link</h2>
            <button onclick="location.reload()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">🔄</button>
        </div>

        <div class="status-panel">
            <div style="display: flex; justify-content: space-between;">
                <div>
                    <span id="status-icon">💤</span>
                    <span id="status-text" style="font-weight: bold; letter-spacing: 1px;">STANDBY</span>
                </div>
                <div class="antenna-box">
                    <div class="ant-bar" style="height: 6px;"></div>
                    <div class="ant-bar" style="height: 10px;"></div>
                    <div class="ant-bar" style="height: 15px;"></div>
                    <div class="ant-bar" style="height: 20px;"></div>
                </div>
            </div>
            <div style="height: 4px; background: #000; margin-top: 10px; border-radius: 2px; overflow: hidden;">
                <div id="progress-bar" style="width: 0%; height: 100%; background: #00ff00; transition: 0.3s; box-shadow: 0 0 10px #00ff00;"></div>
            </div>
        </div>

        <div class="config-bar">
            <span>🕒 자동 삭제 모드</span>
            <select id="expiry-select">
                <option value="0">제한 없음</option>
                <option value="60000">1분 후 (Test)</option>
                <option value="3600000">1시간 후</option>
                <option value="86400000" selected>24시간 후</option>
            </select>
        </div>

        <div class="btn-container">
            <button id="start">
                <div class="signal-wave"></div>
                <div style="position: absolute; width: 88%; height: 88%; border-radius: 50%; border: 1px solid rgba(255,255,255,0.6); pointer-events: none; z-index: 1;"></div>
                <span id="btn-icon">🐧</span>
                <span id="btn-text">PUSH</span>
            </button>
        </div>

        <div class="log-section">
            <div class="log-header">
                <span id="log-count" style="font-size: 0.85rem; color: #666; font-weight: bold;">LOGS (0/100)</span>
                <button id="clear-btn" class="btn-mini">전체 삭제 🗑️</button>
            </div>
            <div id="chat-box"></div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const socket = io();
            let mediaRecorder;
            let audioChunks = [];

            const statusText = document.getElementById('status-text');
            const statusIcon = document.getElementById('status-icon');
            const progressBar = document.getElementById('progress-bar');
            const antennaBars = document.querySelectorAll('.ant-bar');
            const chatBox = document.getElementById('chat-box');
            const btnIcon = document.getElementById('btn-icon');
            const btnText = document.getElementById('btn-text');
            const logCountText = document.getElementById('log-count');

            // 입장 버튼 클릭
            document.getElementById('connect-btn').onclick = () => {
                const entry = document.getElementById('entry-layer');
                const app = document.getElementById('main-app');
                entry.style.opacity = '0';
                setTimeout(() => {
                    entry.style.display = 'none';
                    app.style.opacity = '1';
                    app.style.pointerEvents = 'auto';
                }, 500);
            };

            let audioCtx; 
            async function ensureAudioContext() {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
            }

            const handleStart = async (e) => {
                if (e) e.preventDefault();
                try { await ensureAudioContext(); } catch(err) { console.error(err); }
                audioChunks = [];
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        socket.emit('sync-audio-file', { blob, id: socket.id.substring(0, 5) });
                        addMsg('나', URL.createObjectURL(blob), false);
                        updateUI('standby');
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start();
                    updateUI('recording');
                    if (navigator.vibrate) navigator.vibrate(60); // 진동 살짝 강화
                } catch (err) { alert('⚠️ 마이크를 허용해주세요!'); updateUI('standby'); }
            };

            const handleStop = (e) => {
                if (e) e.preventDefault();
                if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
            };

            const btn = document.getElementById('start');
            btn.addEventListener('touchstart', handleStart);
            btn.addEventListener('touchend', handleStop);
            btn.addEventListener('mousedown', handleStart);
            btn.addEventListener('mouseup', handleStop);

            function updateUI(state, senderId = '') {
                antennaBars.forEach(b => b.classList.remove('active'));
                progressBar.style.width = '0%';
                if (state === 'recording') {
                    statusText.innerText = 'TALKING...'; statusIcon.innerText = '🔴'; btnIcon.innerText = '📢'; btnText.innerText = 'RELEASE'; antennaBars.forEach(b => b.classList.add('active'));
                } else if (state === 'receiving') {
                    statusText.innerText = `INCOMING: ${senderId}`; statusIcon.innerText = '🔊'; btnIcon.innerText = '👂'; antennaBars.forEach(b => b.classList.add('active')); progressBar.style.width = '100%';
                } else {
                    statusText.innerText = 'STANDBY'; statusIcon.innerText = '💤'; btnIcon.innerText = '🐧'; btnText.innerText = 'PUSH';
                }
            }

            function addMsg(id, url, isOther) {
                const div = document.createElement('div');
                div.className = `msg-bubble ${isOther ? 'other' : ''}`;
                div.innerHTML = `<strong>${isOther ? '🐧 ' : '👤 '}${id}</strong><br>
                                 <audio src="${url}" controls style="width:100%; height:30px; margin-top:8px;" ${isOther ? 'autoplay' : ''}></audio>`;
                chatBox.prepend(div);
                while (chatBox.children.length > 100) chatBox.removeChild(chatBox.lastChild);
                logCountText.innerText = `LOGS (${chatBox.children.length}/100)`;
            }

            socket.on('receive-sync-audio', (data) => {
                updateUI('receiving', data.id);
                const blob = new Blob([data.blob], { type: 'audio/webm' });
                addMsg(data.id, URL.createObjectURL(blob), true);
                setTimeout(() => updateUI('standby'), 1500);
            });

            socket.on('logs-cleared-notification', () => { chatBox.innerHTML = ''; logCountText.innerText = `LOGS (0/100)`; });

            document.getElementById('clear-btn').onclick = () => {
                if(confirm('모든 기록을 삭제할까요?')) { socket.emit('clear-logs-signal'); chatBox.innerHTML = ''; logCountText.innerText = `LOGS (0/100)`; }
            };
        });
    </script>
</body>
</html>
