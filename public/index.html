<!DOCTYPE html>
<html>
<head>
    <title>PENG-Link 🐧</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="/socket.io/socket.io.js" defer></script>

    <style>
        /* [기본 스타일] */
        body { margin: 0; padding: 0; background-color: #f0f3f5; overflow-x: hidden; font-family: 'Malgun Gothic', sans-serif; }
        
        /* [개선 2] 백화 현상 방지를 위해 초기 배경색 설정 */
        #entry-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #2c3e50; /* 그라데이션 대신 단색을 먼저 띄워 속도 향상 */
            background: radial-gradient(circle, #2c3e50, #000); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 9999; transition: opacity 0.5s ease-out; 
        }

        /* [개선 3] 초기 블러 효과 제거 (CPU 부하 감소) */
        #main-app { 
            opacity: 0; /* 블러 대신 투명도로 조절하는 게 훨씬 가볍습니다 */
            pointer-events: none; padding: 15px; width: 100%; max-width: 500px; 
            margin: auto; box-sizing: border-box; min-height: 100vh; 
            display: flex; flex-direction: column; transition: opacity 0.5s;
        }
        
        /* 나머지 스타일 동일... */
        #connect-btn { padding: 20px 50px; font-size: 1.4rem; cursor: pointer; border-radius: 50px; border: none; background: #3498db; color: white; font-weight: bold; box-shadow: 0 0 20px rgba(52,152,219,0.5); }
        .status-panel { background: #000; color: #00ff00; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .antenna-box { display: flex; align-items: flex-end; gap: 4px; height: 20px; }
        .ant-bar { width: 6px; background: #222; border-radius: 1px; }
        .ant-bar.active { background: #00ff00; box-shadow: 0 0 8px #00ff00; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .btn-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px 0; }
        #start { 
            width: 220px; height: 220px; border-radius: 50%; border: 10px solid #ddd;
            background: linear-gradient(145deg, #2ecc71, #27ae60);
            color: white; font-size: 1.8rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2), inset 0 -5px 10px rgba(0,0,0,0.1);
            transition: 0.1s; display: flex; flex-direction: column; justify-content: center; align-items: center;
            outline: none; -webkit-tap-highlight-color: transparent;
        }
        #start:active { background: #e74c3c; transform: scale(0.92); border-color: #ff9999; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .log-section { background: white; border-radius: 20px 20px 0 0; padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #chat-box { height: 250px; overflow-y: auto; padding: 5px; }
        .msg-bubble { background: #f8f9fa; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #3498db; }
        .msg-bubble.other { border-left-color: #e67e22; background: #fff5eb; }
        .btn-mini { border: none; padding: 6px 12px; border-radius: 8px; color: white; font-size: 0.75rem; font-weight: bold; }
        #clear-btn { background: #e74c3c; }
    </style>
</head>
<body>
    <div id="entry-layer">
        <div style="font-size: 5rem; margin-bottom: 20px;">🐧</div>
        <h1 style="color: white; margin-bottom: 30px;">PENG-Link v2</h1>
        <button id="connect-btn">무전 시작하기</button>
    </div>

    <div id="main-app">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin: 0;">🐧 PENG-Link</h2>
            <button onclick="location.reload()" style="background:none; border:none; font-size:1.2rem;">🔄</button>
        </div>
        <div class="status-panel">
            <div style="display: flex; justify-content: space-between;">
                <div>
                    <span id="status-icon">💤</span>
                    <span id="status-text" style="font-weight: bold;">STANDBY</span>
                </div>
                <div class="antenna-box">
                    <div class="ant-bar" style="height: 6px;"></div>
                    <div class="ant-bar" style="height: 10px;"></div>
                    <div class="ant-bar" style="height: 15px;"></div>
                    <div class="ant-bar" style="height: 20px;"></div>
                </div>
            </div>
            <div style="height: 4px; background: #222; margin-top: 10px; border-radius: 2px; overflow: hidden;">
                <div id="progress-bar" style="width: 0%; height: 100%; background: #00ff00; transition: 0.3s;"></div>
            </div>
        </div>
        <div class="btn-container">
            <button id="start">
                <span id="btn-icon" style="font-size: 3.5rem;">🎤</span>
                <span id="btn-text">PUSH</span>
            </button>
        </div>
        <div class="log-section">
            <div class="log-header">
                <span style="font-size: 0.8rem; color: #999;">VOICE LOGS</span>
                <button id="clear-btn" class="btn-mini">전체 삭제 🗑️</button>
            </div>
            <div id="chat-box"></div>
        </div>
    </div>

    <script>
        // DOM이 로드되면 즉시 실행
        window.addEventListener('DOMContentLoaded', () => {
            const socket = io();
            let mediaRecorder;
            let audioChunks = [];

            const statusText = document.getElementById('status-text');
            const statusIcon = document.getElementById('status-icon');
            const progressBar = document.getElementById('progress-bar');
            const antennaBars = document.querySelectorAll('.ant-bar');
            const chatBox = document.getElementById('chat-box');
            const btnText = document.getElementById('btn-text');

            // [개선 6] UI 노출 처리 로직
            document.getElementById('connect-btn').onclick = () => {
                const entry = document.getElementById('entry-layer');
                const app = document.getElementById('main-app');
                
                entry.style.opacity = '0';
                setTimeout(() => {
                    entry.style.display = 'none';
                    app.style.opacity = '1';
                    app.style.pointerEvents = 'auto';
                }, 500);
            };

            // PTT 핵심 로직 동일...
            const handleStart = async (e) => {
                if (e) e.preventDefault();
                audioChunks = [];
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        socket.emit('sync-audio-file', { blob, id: socket.id.substring(0, 5) });
                        addMsg('나', URL.createObjectURL(blob), false);
                        updateUI('standby');
                    };
                    mediaRecorder.start();
                    updateUI('recording');
                    if (navigator.vibrate) navigator.vibrate(40);
                } catch (err) { alert('마이크 권한이 필요합니다!'); }
            };

            const handleStop = (e) => {
                if (e) e.preventDefault();
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    mediaRecorder.stream.getTracks().forEach(t => t.stop());
                    if (navigator.vibrate) navigator.vibrate(20);
                }
            };

            const btn = document.getElementById('start');
            btn.addEventListener('touchstart', handleStart);
            btn.addEventListener('touchend', handleStop);
            btn.addEventListener('mousedown', handleStart);
            btn.addEventListener('mouseup', handleStop);

            function updateUI(state, senderId = '') {
                antennaBars.forEach(b => b.classList.remove('active'));
                progressBar.style.width = '0%';
                if (state === 'recording') {
                    statusText.innerText = 'TALKING...';
                    statusIcon.innerText = '🔴';
                    btnText.innerText = 'RELEASE';
                    antennaBars.forEach(b => b.classList.add('active'));
                } else if (state === 'receiving') {
                    statusText.innerText = `INCOMING: ${senderId}`;
                    statusIcon.innerText = '🔊';
                    antennaBars.forEach(b => b.classList.add('active'));
                    progressBar.style.width = '100%';
                } else {
                    statusText.innerText = 'STANDBY';
                    statusIcon.innerText = '💤';
                    btnText.innerText = 'PUSH';
                }
            }

            socket.on('receive-sync-audio', (data) => {
                updateUI('receiving', data.id);
                const blob = new Blob([data.blob], { type: 'audio/webm' });
                addMsg(data.id, URL.createObjectURL(blob), true);
                setTimeout(() => updateUI('standby'), 1500);
            });

            socket.on('logs-cleared-notification', () => {
                chatBox.innerHTML = '<div style="text-align:center; color:#ccc; font-size:0.8rem;">기록이 삭제되었습니다.</div>';
            });

            document.getElementById('clear-btn').onclick = () => {
                if(confirm('서버와 클라이언트의 모든 기록을 지울까요?')) {
                    socket.emit('clear-logs-signal');
                    chatBox.innerHTML = '';
                }
            };

            function addMsg(id, url, isOther) {
                const div = document.createElement('div');
                div.className = `msg-bubble ${isOther ? 'other' : ''}`;
                div.innerHTML = `<strong>${isOther ? '🐧 ' : '👤 '}${id}</strong><br>
                                 <audio src="${url}" controls style="width:100%; height:30px; margin-top:5px;" ${isOther ? 'autoplay' : ''}></audio>`;
                chatBox.prepend(div);
            }
        });
    </script>
</body>
</html>
