<!DOCTYPE html>
<html>
<head>
    <title>PENG-Link 🐧</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* [기존 스타일 유지] */
        body { margin: 0; padding: 0; background-color: #f4f7f6; overflow-x: hidden; }
        #entry-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 62, 80, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #connect-btn { padding: 20px 40px; font-size: 1.5rem; cursor: pointer; border-radius: 50px; border: none; background: #3498db; color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #main-app { filter: blur(5px); pointer-events: none; padding: 15px; font-family: 'Malgun Gothic', sans-serif; width: 95%; max-width: 500px; margin: auto; box-sizing: border-box; }
        
        .status-panel { background: #1a1a1a; color: #00ff00; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 2px solid #333; box-shadow: inset 0 0 10px #000; }
        .antenna-box { display: flex; align-items: flex-end; gap: 4px; height: 24px; }
        .ant-bar { width: 7px; background: #333; border-radius: 1px; transition: 0.2s; }
        .ant-bar.active { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
        .listen-container { height: 12px; background: #222; border-radius: 6px; overflow: hidden; margin-top: 10px; border: 1px solid #333; }
        #listen-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #3498db, #00ff00); transition: width 0.3s ease; }

        #start { padding: 25px 0; font-size: 1.5rem; width: 100%; background: #2ecc71; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; box-shadow: 0 6px #27ae60; outline: none; -webkit-tap-highlight-color: transparent; }
        #start:active { background: #e74c3c; transform: translateY(4px); box-shadow: 0 2px #c0392b; }
        
        /* [수정] 로그 제어 바 스타일 */
        .log-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 25px; padding: 0 5px;
        }
        
        /* 버튼 공통 스타일 */
        .btn-mini {
            border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; 
            font-size: 0.8rem; font-weight: bold; color: white; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        #clear-btn { background: #95a5a6; }
        #refresh-btn { background: #34495e; margin-left: 5px; }
        .btn-mini:active { opacity: 0.7; transform: scale(0.95); }

        #chat-box { height: calc(100vh - 460px); min-height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; background: #fff; border-radius: 10px; margin-top: 10px; }
        .audio-msg { width: 100%; margin-top: 5px; }

        /* 상단 타이틀 바 정렬 */
        .title-bar {
            display: flex; justify-content: center; align-items: center; position: relative;
            margin-bottom: 15px;
        }
        .reload-icon {
            position: absolute; right: 0; background: none; border: none; 
            font-size: 1.4rem; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="entry-layer">
        <h1 style="color: white; font-size: 3rem; margin-bottom: 10px;">🐧 PENG-Link</h1>
        <button id="connect-btn">펭링크 접속하기</button>
    </div>

    <div id="main-app">
        <div class="title-bar">
            <h1 style="margin: 0; font-size: 1.8rem;">🐧 PENG-Link CORE</h1>
            <button onclick="location.reload()" class="reload-icon" title="새로고침">🔄</button>
        </div>

        <div class="status-panel">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span id="status-icon">💤</span>
                    <span id="status-text" style="font-weight: bold; letter-spacing: 1px;">STANDBY...</span>
                </div>
                <div class="antenna-box" id="antenna">
                    <div class="ant-bar" style="height: 8px;"></div>
                    <div class="ant-bar" style="height: 14px;"></div>
                    <div class="ant-bar" style="height: 20px;"></div>
                    <div class="ant-bar" style="height: 26px;"></div>
                </div>
            </div>
            <div class="listen-container">
                <div id="listen-bar"></div>
            </div>
            <div style="font-size: 0.7rem; margin-top: 6px; text-align: right; color: #555;">FILE SYNC MODE / AUTO-TRANSFER</div>
        </div>
        
        <button id="start">🎤 누르고 말하기 (PTT)</button>
        
        <div class="log-header">
            <span style="font-size: 0.8rem; color: #7f8c8d; font-weight: bold;">COMMUNICATION LOGS</span>
            <div>
                <button id="clear-btn" class="btn-mini">기록 비우기 🗑️</button>
                <button onclick="location.reload()" id="refresh-btn" class="btn-mini">업데이트 🔄</button>
            </div>
        </div>

        <div id="chat-box"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let mediaRecorder;
        let audioChunks = [];

        const listenBar = document.getElementById('listen-bar');
        const antennaBars = document.querySelectorAll('.ant-bar');
        const statusText = document.getElementById('status-text');
        const statusIcon = document.getElementById('status-icon');
        const chatBox = document.getElementById('chat-box');

        function setUIState(state) {
            if (state === 'recording') {
                statusText.innerText = 'RECORDING...';
                statusText.style.color = '#ff4d4d';
                statusIcon.innerText = '🔴';
                antennaBars.forEach(b => b.classList.add('active'));
            } else if (state === 'syncing') {
                statusText.innerText = 'SYNCING...';
                statusText.style.color = '#3498db';
                statusIcon.innerText = '⏳';
                listenBar.style.width = '100%';
            } else if (state === 'receiving') {
                statusText.innerText = 'INCOMING...';
                statusText.style.color = '#00ff00';
                statusIcon.innerText = '🔊';
                antennaBars.forEach(b => b.classList.add('active'));
            } else {
                statusText.innerText = 'STANDBY...';
                statusText.style.color = '#00ff00';
                statusIcon.innerText = '💤';
                antennaBars.forEach(b => b.classList.remove('active'));
                listenBar.style.width = '0%';
            }
        }

        document.getElementById('connect-btn').onclick = () => {
            document.getElementById('entry-layer').style.display = 'none';
            document.getElementById('main-app').style.filter = 'none';
            document.getElementById('main-app').style.pointerEvents = 'auto';
        };

        document.getElementById('clear-btn').onclick = () => {
            if (confirm('모든 무전 기록을 삭제하시겠습니까?')) {
                chatBox.innerHTML = '';
                if (navigator.vibrate) navigator.vibrate(20);
            }
        };

        const startPTT = async () => {
            audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    setUIState('syncing');
                    const finalBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    socket.emit('sync-audio-file', {
                        blob: finalBlob,
                        id: socket.id.substring(0, 5)
                    });
                    addAudioToChat('나', URL.createObjectURL(finalBlob));
                    setTimeout(() => setUIState('standby'), 800);
                };

                mediaRecorder.start();
                setUIState('recording');
                if (navigator.vibrate) navigator.vibrate(50);
            } catch (err) { console.error(err); }
        };

        const stopPTT = () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                if (navigator.vibrate) navigator.vibrate(30);
            }
        };

        const btn = document.getElementById('start');
        btn.addEventListener('mousedown', startPTT);
        btn.addEventListener('mouseup', stopPTT);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); startPTT(); });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); stopPTT(); });

        socket.on('receive-sync-audio', (data) => {
            setUIState('receiving');
            const blob = new Blob([data.blob], { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            addAudioToChat(data.id, url, true);
            setTimeout(() => setUIState('standby'), 2000);
        });

        function addAudioToChat(id, url, autoPlay = false) {
            const div = document.createElement('div');
            div.style.padding = "10px";
            div.style.borderBottom = "1px solid #eee";
            div.innerHTML = `<b>[${id}]</b> 수신:<br><audio controls src="${url}" class="audio-msg" ${autoPlay ? 'autoplay' : ''}></audio>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
